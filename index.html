<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI應用規劃師｜中級模擬考練習 _ FB 雲橫介工程師 分享</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
      --main:#2563eb; --ok:#16a34a; --bad:#dc2626; --warn:#d97706; --line:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 22px rgba(15,23,42,.06);margin-bottom:16px}
    h1{font-size:24px;margin:0 0 8px}
    h2{font-size:18px;margin:0 0 10px}
    h3{font-size:16px;margin:14px 0 8px}
    .muted{color:var(--muted);font-size:14px;line-height:1.6}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,select{border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:15px;background:white}
    input[type="number"]{width:110px}
    button{border:0;border-radius:12px;padding:10px 14px;font-size:15px;cursor:pointer;background:var(--main);color:white;font-weight:700}
    button.secondary{background:#111827}
    button.ghost{background:#eef2ff;color:#1e40af}
    button:disabled{opacity:.45;cursor:not-allowed}
    .pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#1e40af;font-size:13px;font-weight:700}
    .pill.okPill{background:#ecfdf5;color:#047857}
    .pill.badPill{background:#fef2f2;color:#b91c1c}
    .qtitle{font-size:18px;line-height:1.7;font-weight:750;white-space:pre-wrap}
    .option{display:block;width:100%;text-align:left;background:white;color:var(--text);border:1px solid var(--line);padding:13px 14px;border-radius:14px;margin:10px 0;font-weight:600}
    .option:hover{border-color:#93c5fd;background:#f8fbff}
    .option.selected{border-color:var(--main);background:#eff6ff}
    .option.correct{border-color:var(--ok);background:#ecfdf5;color:#065f46}
    .option.wrong{border-color:var(--bad);background:#fef2f2;color:#991b1b}
    .result{font-weight:800;font-size:18px;margin-top:12px}
    .ok{color:var(--ok)} .bad{color:var(--bad)} .warn{color:var(--warn)}
    .bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}
    .bar>div{height:100%;background:var(--main);width:0%}
    .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .stat{padding:12px;border-radius:14px;background:#f9fafb;border:1px solid var(--line);text-align:center}
    .stat b{display:block;font-size:22px;margin-bottom:4px}
    .hidden{display:none}
    .small{font-size:13px}
    .resultBox{padding:14px 16px;border-radius:16px;border:1px solid var(--line);background:#f9fafb;margin:12px 0 14px}
    .resultBox.pass{background:#ecfdf5;border-color:#86efac;color:#065f46}
    .resultBox.fail{background:#fef2f2;border-color:#fecaca;color:#991b1b}
    .resultBox b{font-size:20px}
    .weakList{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:8px}
    .weakItem{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px}
    .weakItem b{display:block;margin-bottom:4px}
    .reviewItem{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px;margin:12px 0}
    .reviewHead{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
    .reviewQuestion{white-space:pre-wrap;font-weight:750;line-height:1.6;margin:8px 0 10px}
    .reviewOptions{display:grid;gap:8px;margin:8px 0}
    .reviewOption{border:1px solid var(--line);border-radius:12px;padding:9px 10px;background:#f9fafb}
    .reviewOption.correct{border-color:#86efac;background:#ecfdf5;color:#065f46;font-weight:700}
    .reviewOption.wrong{border-color:#fecaca;background:#fef2f2;color:#991b1b;font-weight:700}
    .explain{border-left:4px solid var(--main);padding:8px 10px;background:#f8fbff;border-radius:10px;margin-top:10px;line-height:1.7}
    .toolbar{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(246,247,251,0),var(--bg) 25%);padding-top:16px;margin-top:8px}

    .scopeTools{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 8px}
    .scopeBox{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px;margin-top:8px}
    .scopeCheck{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--line);border-radius:12px;background:#f9fafb;padding:9px 10px;line-height:1.45;cursor:pointer}
    .scopeCheck input{width:auto;margin-top:3px;flex:0 0 auto}
    .scopeCheck span{font-size:14px;font-weight:650}
    .scopeCheck small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
    .scopeCheck:hover{border-color:#93c5fd;background:#f8fbff}

    .topBar{display:flex;justify-content:flex-end;margin-bottom:12px}
    .themeBtn{min-width:132px}
    :root[data-theme="dark"]{
      --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#94a3b8;
      --main:#60a5fa; --ok:#4ade80; --bad:#f87171; --warn:#fbbf24; --line:#334155;
    }
    :root[data-theme="dark"] body{color-scheme:dark}
    :root[data-theme="dark"] .card{box-shadow:0 8px 22px rgba(0,0,0,.35)}
    :root[data-theme="dark"] input,
    :root[data-theme="dark"] select{background:#0b1220;color:var(--text);border-color:var(--line)}
    :root[data-theme="dark"] button.secondary{background:#334155;color:#e5e7eb}
    :root[data-theme="dark"] button.ghost{background:#1e293b;color:#bfdbfe}
    :root[data-theme="dark"] .pill{background:#172554;color:#bfdbfe}
    :root[data-theme="dark"] .pill.okPill{background:#052e16;color:#bbf7d0}
    :root[data-theme="dark"] .pill.badPill{background:#450a0a;color:#fecaca}
    :root[data-theme="dark"] .option{background:#0b1220;color:var(--text);border-color:var(--line)}
    :root[data-theme="dark"] .option:hover{border-color:#60a5fa;background:#111c31}
    :root[data-theme="dark"] .option.selected{border-color:#60a5fa;background:#172554;color:#dbeafe}
    :root[data-theme="dark"] .option.correct{border-color:#22c55e;background:#052e16;color:#bbf7d0}
    :root[data-theme="dark"] .option.wrong{border-color:#ef4444;background:#450a0a;color:#fecaca}
    :root[data-theme="dark"] .bar{background:#334155}
    :root[data-theme="dark"] .stat,
    :root[data-theme="dark"] .resultBox,
    :root[data-theme="dark"] .weakItem,
    :root[data-theme="dark"] .reviewItem,
    :root[data-theme="dark"] .reviewOption{background:#0b1220;border-color:var(--line);color:var(--text)}
    :root[data-theme="dark"] .resultBox.pass{background:#052e16;border-color:#166534;color:#bbf7d0}
    :root[data-theme="dark"] .resultBox.fail{background:#450a0a;border-color:#991b1b;color:#fecaca}
    :root[data-theme="dark"] .reviewOption.correct{border-color:#22c55e;background:#052e16;color:#bbf7d0}
    :root[data-theme="dark"] .reviewOption.wrong{border-color:#ef4444;background:#450a0a;color:#fecaca}
    :root[data-theme="dark"] .explain{background:#0b1220;border-left-color:#60a5fa;color:var(--text)}
    :root[data-theme="dark"] .toolbar{background:linear-gradient(180deg,rgba(15,23,42,0),var(--bg) 25%)}

    :root[data-theme="dark"] .scopeCheck{background:#0b1220;border-color:var(--line);color:var(--text)}
    :root[data-theme="dark"] .scopeCheck:hover{border-color:#60a5fa;background:#111c31}
    :root[data-theme="dark"] a{color:#93c5fd}
    @media(max-width:650px){
      .wrap{padding:12px}
      .grid{grid-template-columns:repeat(2,1fr)}
      h1{font-size:21px}
      .qtitle{font-size:17px}
      button,input,select{width:100%}
      .reviewHead .pill{width:auto}
      .topBar{justify-content:stretch}
      .themeBtn{width:100%}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topBar">
    <button id="themeToggleBtn" class="ghost themeBtn" type="button">🌙 夜間模式</button>
  </div>
  <div class="card">
    <h1>AI應用規劃師｜中級｜模擬考練習 _ FB 雲橫介工程師 分享</h1>
    <div class="muted">
      題庫來源：Google Sheet。題目範圍可放入 IPAS 中級歷屆考題與 AI 生成模擬試題。
      支援欄位名稱：<b>題號、範圍、題目類型、題目、選項1、選項2、選項3、選項4、正確答案、解析</b>。
    </div>
  </div>

  <div id="setup" class="card">
    <h2>考前設定</h2>
    <div class="row">
      <label>題數 <input id="countInput" type="number" min="1" value="20"></label>
      <label>模式
        <select id="modeInput">
          <option value="instant">練習模式：每題立即看答案</option>
          <option value="exam">考試模式：最後才看結果</option>
        </select>
      </label>
      <button id="startBtn">開始模擬考</button>
      <button class="ghost" id="reloadBtn">重新讀取題庫</button>
    </div>

    <h3>練習範圍</h3>
    <div class="scopeTools">
      <button class="ghost" id="scopeAllBtn" type="button">全選範圍</button>
      <button class="ghost" id="scopeClearBtn" type="button">清除勾選</button>
    </div>
    <div id="scopeFilterBox" class="scopeBox"></div>
    <p id="scopeFilterMsg" class="muted small">讀取題庫後會自動產生範圍清單，預設全選。</p>

    <p id="loadMsg" class="muted">正在讀取題庫...</p>
    <p class="muted small">總分 100 分，預設 70 分為通過門檻。放到 GitHub Pages 後，別人只要打開網址就能練習。</p>
  </div>

  <div id="quiz" class="card hidden">
    <div class="row" style="justify-content:space-between">
      <span class="pill" id="progressText">第 1 / 20 題</span>
      <span class="pill" id="scoreText">目前答對：0</span>
    </div>
    <div class="bar"><div id="progressBar"></div></div>
    <hr style="border:0;border-top:1px solid var(--line);margin:18px 0">
    <div id="questionText" class="qtitle"></div>
    <div id="options"></div>
    <div id="feedback" class="muted"></div>
    <div class="toolbar">
      <div class="row" style="margin-top:14px">
        <button id="submitBtn">確認答案</button>
        <button class="secondary" id="nextBtn" disabled>下一題</button>
      </div>
    </div>
  </div>

  <div id="finish" class="card hidden">
    <h2>測驗結果</h2>
    <div id="passText" class="resultBox"></div>
    <div class="grid">
      <div class="stat"><b id="finalScore">0</b>總分</div>
      <div class="stat"><b id="finalCorrect">0</b>答對</div>
      <div class="stat"><b id="finalWrong">0</b>答錯</div>
      <div class="stat"><b id="finalRate">0%</b>正確率</div>
      <div class="stat"><b id="pointEach">0</b>每題分數</div>
    </div>

    <div id="weaknessBox" style="margin-top:14px"></div>

    <div class="row" style="margin-top:14px">
      <button id="againBtn">再考一次</button>
      <button class="ghost" id="reviewBtn">查看錯題</button>
      <button class="secondary" id="wrongOnlyBtn">只練錯題</button>
    </div>
  </div>

  <div id="review" class="card hidden">
    <h2>錯題複習 / 預習重點</h2>
    <div id="reviewTable"></div>
  </div>
</div>

<script>
const SHEET_ID = "1G8siOLbJ6Has1GwZgeQ90HUXyAC82xY0IZn8pKOg0LY";
const GID = "0";

// 可自行調整：總分與通過門檻
const TOTAL_SCORE = 100;
const PASS_SCORE = 70;

let bank = [];
let quiz = [];
let index = 0;
let selected = null;
let answers = [];
let correctCount = 0;
let mode = "instant";
let scopeNames = [];

const $ = id => document.getElementById(id);
const LETTERS = ["A","B","C","D"];

function getSavedTheme(){
  try{return localStorage.getItem("aiExamTheme") || "";}catch(e){return "";}
}

function saveTheme(theme){
  try{localStorage.setItem("aiExamTheme", theme);}catch(e){}
}

function applyTheme(theme){
  const finalTheme = theme === "dark" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", finalTheme);
  saveTheme(finalTheme);
  const btn = $("themeToggleBtn");
  if(btn){
    btn.textContent = finalTheme === "dark" ? "☀️ 日間模式" : "🌙 夜間模式";
    btn.setAttribute("aria-label", finalTheme === "dark" ? "切換到日間模式" : "切換到夜間模式");
  }
}

function initTheme(){
  const saved = getSavedTheme();
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(saved || (prefersDark ? "dark" : "light"));
}

function toggleTheme(){
  const current = document.documentElement.getAttribute("data-theme") || "light";
  applyTheme(current === "dark" ? "light" : "dark");
}


function normalizeHeader(h){
  return String(h || "").trim().toLowerCase()
    .replace(/\s/g,"")
    .replace("：","")
    .replace(":","")
    .replace("選項","")
    .replace("option","");
}

function pick(obj, names){
  for(const n of names){
    const key = Object.keys(obj).find(k => normalizeHeader(k) === normalizeHeader(n));
    if(key && obj[key] !== undefined && String(obj[key]).trim() !== "") return String(obj[key]).trim();
  }
  return "";
}

function gvizToRows(json){
  const cols = json.table.cols.map(c => c.label || c.id || "");
  const rows = json.table.rows.map(r => {
    return r.c.map(cell => {
      if(!cell) return "";
      return cell.f !== undefined ? cell.f : (cell.v !== undefined ? cell.v : "");
    });
  });
  return [cols, ...rows];
}

function rowsToQuestions(rows){
  if(!rows || rows.length < 2) return [];
  const header = rows[0].map(x => String(x || "").trim());
  const dataRows = rows.slice(1).filter(r => r.some(x => String(x||"").trim()));

  return dataRows.map(r => {
    const obj = {};
    header.forEach((h,i)=>obj[h]=r[i] || "");

    const no = pick(obj, ["題號","編號","no","id"]);
    const scope = pick(obj, ["範圍","章節","科目","分類","range","scope"]);
    const type = pick(obj, ["題目類型","類型","題型","type"]);
    const q = pick(obj, ["題目","問題","question","試題"]);

    const opts = [
      pick(obj, ["選項1","選項一","1","A","甲","選項A","optionA"]),
      pick(obj, ["選項2","選項二","2","B","乙","選項B","optionB"]),
      pick(obj, ["選項3","選項三","3","C","丙","選項C","optionC"]),
      pick(obj, ["選項4","選項四","4","D","丁","選項D","optionD"])
    ].filter(Boolean);

    const ans = pick(obj, ["正確答案","答案","正解","answer","correct"]);
    const exp = pick(obj, ["解析","說明","explanation"]);

    return {no, scope, type, q, opts, ans, exp};
  }).filter(x => x.q && x.opts.length >= 2 && x.ans);
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}


function scopeKey(scope){
  const s = String(scope || "").trim();
  return s || "未分類";
}

function getScopeCounts(){
  const counter = {};
  bank.forEach(item => {
    const key = scopeKey(item.scope);
    counter[key] = (counter[key] || 0) + 1;
  });
  return counter;
}

function renderScopeFilters(){
  const box = $("scopeFilterBox");
  if(!box) return;

  box.innerHTML = "";
  const counts = getScopeCounts();
  scopeNames = Object.keys(counts).sort((a,b)=>a.localeCompare(b, "zh-Hant"));

  if(!scopeNames.length){
    $("scopeFilterMsg").textContent = "尚未讀到範圍資料。";
    return;
  }

  scopeNames.forEach(name => {
    const label = document.createElement("label");
    label.className = "scopeCheck";

    const input = document.createElement("input");
    input.type = "checkbox";
    input.className = "scopeInput";
    input.value = name;
    input.checked = true;
    input.addEventListener("change", updateFilteredCount);

    const textWrap = document.createElement("span");
    textWrap.textContent = name;

    const small = document.createElement("small");
    small.textContent = `${counts[name]} 題`;
    textWrap.appendChild(small);

    label.appendChild(input);
    label.appendChild(textWrap);
    box.appendChild(label);
  });

  updateFilteredCount();
}

function getSelectedScopes(){
  return [...document.querySelectorAll(".scopeInput:checked")].map(input => input.value);
}

function getFilteredBank(){
  const selectedScopes = new Set(getSelectedScopes());
  if(!selectedScopes.size) return [];
  return bank.filter(item => selectedScopes.has(scopeKey(item.scope)));
}

function updateFilteredCount(){
  if(!$("scopeFilterMsg")) return;

  const selectedScopes = getSelectedScopes();
  const pool = getFilteredBank();
  const max = Math.max(pool.length, 1);
  const current = Number($("countInput").value || 20);

  $("countInput").max = max;
  $("countInput").value = Math.min(current, max);

  $("scopeFilterMsg").textContent =
    selectedScopes.length
      ? `目前已選 ${selectedScopes.length} 個範圍，共 ${pool.length} 題可抽。`
      : "目前沒有勾選範圍，請至少選一個範圍才能開始。";
}

function setAllScopes(checked){
  document.querySelectorAll(".scopeInput").forEach(input => input.checked = checked);
  updateFilteredCount();
}

function answerIndex(item){
  const raw = String(item.ans || "").trim();
  const a = raw.toUpperCase();

  // A/B/C/D
  if(LETTERS.includes(a)) return LETTERS.indexOf(a);

  // 1/2/3/4、選項1、答案1
  const numMatch = raw.match(/[1-4]/);
  if(numMatch && raw.length <= 8) return Number(numMatch[0]) - 1;

  // (A)、A.、答案A
  const letterMatch = a.match(/[ABCD]/);
  if(letterMatch && a.length <= 8) return LETTERS.indexOf(letterMatch[0]);

  // 正確答案直接填完整選項文字
  const idx = item.opts.findIndex(o => String(o).trim() === raw);
  return idx >= 0 ? idx : -1;
}

function loadGoogleSheetByJSONP(){
  return new Promise((resolve, reject) => {
    const callbackName = "googleSheetCallback_" + Date.now();
    const script = document.createElement("script");

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("讀取逾時。請確認 Google Sheet 權限為「知道連結的任何人可以檢視」。"));
    }, 15000);

    function cleanup(){
      clearTimeout(timer);
      delete window[callbackName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(json){
      cleanup();
      resolve(json);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("Google Sheet 載入失敗。請確認試算表權限或工作表 gid。"));
    };

    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&tqx=responseHandler:${callbackName}&t=${Date.now()}`;
    document.body.appendChild(script);
  });
}

async function loadBank(){
  $("loadMsg").textContent = "正在讀取題庫...";
  try{
    const json = await loadGoogleSheetByJSONP();
    const rows = gvizToRows(json);
    bank = rowsToQuestions(rows);

    if(!bank.length){
      console.log(rows.slice(0,5));
      throw new Error("讀不到題目，請確認第一列欄位包含：題號、範圍、題目類型、題目、選項1、選項2、選項3、選項4、正確答案、解析。");
    }

    $("loadMsg").textContent = `題庫讀取成功：共 ${bank.length} 題。`;
    renderScopeFilters();
    updateFilteredCount();
  }catch(e){
    $("loadMsg").innerHTML =
      `讀取失敗：${escapeHtml(e.message)}<br>` +
      `請確認 Google Sheet 權限為「知道連結的任何人可以檢視」，欄位名稱為：題號、範圍、題目類型、題目、選項1、選項2、選項3、選項4、正確答案、解析。`;
  }
}

function resetQuizState(){
  index = 0;
  selected = null;
  answers = [];
  correctCount = 0;
  $("setup").classList.add("hidden");
  $("finish").classList.add("hidden");
  $("review").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  renderQuestion();
}

function startQuiz(){
  if(!bank.length){ alert("題庫尚未讀取成功"); return; }

  const pool = getFilteredBank();
  if(!pool.length){
    alert("請至少勾選一個有題目的範圍");
    return;
  }

  mode = $("modeInput").value;
  const count = Math.min(Number($("countInput").value || 20), pool.length);
  quiz = shuffle(pool).slice(0,count);
  resetQuizState();
}

function startWrongQuiz(){
  const wrongItems = answers.filter(a => !a.isCorrect).map(a => a.item);
  if(!wrongItems.length){
    alert("這次沒有錯題，不需要重練。");
    return;
  }
  mode = "instant"; // 錯題重練預設立即看解析，方便複習
  quiz = shuffle(wrongItems);
  resetQuizState();
}

function renderQuestion(){
  selected = null;
  const item = quiz[index];
  $("progressText").textContent = `第 ${index+1} / ${quiz.length} 題`;
  $("scoreText").textContent = `目前答對：${correctCount}`;
  $("progressBar").style.width = `${((index)/quiz.length)*100}%`;

  const meta = [
    item.no ? `題號：${item.no}` : "",
    item.scope ? `範圍：${item.scope}` : "",
    item.type ? `題型：${item.type}` : ""
  ].filter(Boolean).join("　");

  $("questionText").textContent = (meta ? meta + "\n\n" : "") + item.q;
  $("feedback").innerHTML = "";
  $("submitBtn").disabled = false;
  $("nextBtn").disabled = true;

  $("options").innerHTML = "";
  item.opts.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = `${LETTERS[i]}. ${opt}`;
    btn.onclick = () => {
      selected = i;
      [...document.querySelectorAll(".option")].forEach(x=>x.classList.remove("selected"));
      btn.classList.add("selected");
    };
    $("options").appendChild(btn);
  });
}

function submitAnswer(){
  if(selected === null){ alert("請先選一個答案"); return; }

  const item = quiz[index];
  const correct = answerIndex(item);
  const isCorrect = correct >= 0 && selected === correct;

  answers.push({item, selected, correct, isCorrect});
  if(isCorrect) correctCount++;

  $("scoreText").textContent = `目前答對：${correctCount}`;
  $("submitBtn").disabled = true;
  $("nextBtn").disabled = false;

  if(mode === "instant"){
    [...document.querySelectorAll(".option")].forEach((btn,i)=>{
      if(i === correct) btn.classList.add("correct");
      if(i === selected && !isCorrect) btn.classList.add("wrong");
    });

    const correctText = correct >= 0
      ? `${LETTERS[correct]}．${item.opts[correct]}`
      : item.ans;

    $("feedback").innerHTML =
      `<div class="result ${isCorrect ? "ok" : "bad"}">${isCorrect ? "答對了！" : "答錯了！"} 正解：${escapeHtml(correctText)}</div>` +
      (item.exp ? `<p><b>解析：</b>${escapeHtml(item.exp)}</p>` : "");
  }
}

function nextQuestion(){
  index++;
  if(index >= quiz.length) finishQuiz();
  else renderQuestion();
}

function finishQuiz(){
  $("quiz").classList.add("hidden");
  $("finish").classList.remove("hidden");
  $("progressBar").style.width = `100%`;

  const total = quiz.length;
  const wrongCount = total - correctCount;
  const rate = total ? Math.round((correctCount / total) * 100) : 0;
  const score = total ? Math.round((correctCount / total) * TOTAL_SCORE) : 0;
  const pointEach = total ? (TOTAL_SCORE / total).toFixed(2) : "0";

  $("finalScore").textContent = `${score}/${TOTAL_SCORE}`;
  $("finalCorrect").textContent = correctCount;
  $("finalWrong").textContent = wrongCount;
  $("finalRate").textContent = `${rate}%`;
  $("pointEach").textContent = pointEach;

  const pass = score >= PASS_SCORE;
  $("passText").className = `resultBox ${pass ? "pass" : "fail"}`;
  $("passText").innerHTML = pass
    ? `<b>結果：通過門檻</b><br>本次 ${score} 分，已達 ${PASS_SCORE} 分門檻。可以繼續加強錯題，讓分數更穩。`
    : `<b>結果：未達門檻</b><br>本次 ${score} 分，距離 ${PASS_SCORE} 分還差 ${PASS_SCORE - score} 分。建議先看下方錯題與弱點分類。`;

  renderWeakness();
  reviewWrong(true); // 考完自動顯示錯題，方便預習
}

function renderWeakness(){
  const wrong = answers.filter(a => !a.isCorrect);
  if(!wrong.length){
    $("weaknessBox").innerHTML = `<h3>弱點分析</h3><p class="muted">本次沒有錯題，表現很穩。可以提高題數或改用考試模式挑戰。</p>`;
    return;
  }

  const counter = {};
  wrong.forEach(a => {
    const key = a.item.scope || a.item.type || "未分類";
    counter[key] = (counter[key] || 0) + 1;
  });

  const items = Object.entries(counter).sort((a,b)=>b[1]-a[1]);
  $("weaknessBox").innerHTML = `
    <h3>弱點分析</h3>
    <p class="muted">錯題主要集中在以下範圍，建議優先複習：</p>
    <div class="weakList">
      ${items.map(([name,count]) => `
        <div class="weakItem">
          <b>${escapeHtml(name)}</b>
          <span class="bad">${count} 題錯誤</span>
        </div>
      `).join("")}
    </div>
  `;
}

function reviewWrong(autoOpen=false){
  const wrong = answers.filter(a => !a.isCorrect);
  $("review").classList.remove("hidden");

  if(!wrong.length){
    $("reviewTable").innerHTML = "<p class='muted'>恭喜，沒有錯題。</p>";
    $("wrongOnlyBtn").disabled = true;
    return;
  }

  $("wrongOnlyBtn").disabled = false;

  $("reviewTable").innerHTML = `
    <p class="muted">共 ${wrong.length} 題錯題。先看解析，再按「只練錯題」重跑一輪，會比較有感。</p>
    ${wrong.map((a,idx)=>renderReviewItem(a, idx)).join("")}
  `;

  if(!autoOpen){
    $("review").scrollIntoView({behavior:"smooth", block:"start"});
  }
}

function renderReviewItem(a, idx){
  const item = a.item;
  const meta = [
    item.no ? `題號：${item.no}` : "",
    item.scope ? `範圍：${item.scope}` : "",
    item.type ? `題型：${item.type}` : ""
  ].filter(Boolean);

  const yourAnswer = `${LETTERS[a.selected] || "-"}．${item.opts[a.selected] || ""}`;
  const correctAnswer = a.correct >= 0
    ? `${LETTERS[a.correct]}．${item.opts[a.correct]}`
    : item.ans;

  return `
    <div class="reviewItem">
      <div class="reviewHead">
        <span class="pill badPill">錯題 ${idx+1}</span>
        ${meta.map(m=>`<span class="pill">${escapeHtml(m)}</span>`).join("")}
      </div>

      <div class="reviewQuestion">${escapeHtml(item.q)}</div>

      <div class="muted">
        你的答案：<b class="bad">${escapeHtml(yourAnswer)}</b><br>
        正確答案：<b class="ok">${escapeHtml(correctAnswer)}</b>
      </div>

      <div class="reviewOptions">
        ${item.opts.map((opt,i)=>{
          const cls = i === a.correct ? "correct" : (i === a.selected ? "wrong" : "");
          return `<div class="reviewOption ${cls}">${LETTERS[i]}．${escapeHtml(opt)}</div>`;
        }).join("")}
      </div>

      <div class="explain">
        <b>解析：</b>${escapeHtml(item.exp || "這題目前沒有解析，建議回教材查這個觀念。")}
      </div>
    </div>
  `;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

$("startBtn").onclick = startQuiz;
$("reloadBtn").onclick = loadBank;
$("scopeAllBtn").onclick = () => setAllScopes(true);
$("scopeClearBtn").onclick = () => setAllScopes(false);
$("countInput").addEventListener("change", updateFilteredCount);
$("submitBtn").onclick = submitAnswer;
$("nextBtn").onclick = nextQuestion;
$("againBtn").onclick = () => {
  $("finish").classList.add("hidden");
  $("review").classList.add("hidden");
  $("setup").classList.remove("hidden");
};
$("reviewBtn").onclick = () => reviewWrong(false);
$("wrongOnlyBtn").onclick = startWrongQuiz;
$("themeToggleBtn").onclick = toggleTheme;

initTheme();
loadBank();
</script>
</body>
</html>
